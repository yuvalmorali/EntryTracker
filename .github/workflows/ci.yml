name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]  

permissions:
  id-token: write
  contents: read
  
jobs:
  ci:
    runs-on: ubuntu-latest

    env:
          DB_HOST: mysql-db
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: app_db
    steps:
    # Part 1: Pull the application source code
      - name: Checkout source code
        uses: actions/checkout@v4
    #Part 2: Build the application
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
    #Part 3: Run unit tests
      - name: Run Flask app in background
        run: |
          python app.py &
          echo $! > flask.pid

      - name: run health check
        run: |
          sleep 5
          curl --fail http://localhost:5000/ || exit 1

      - name: Stop standalone Flask app
        if: always()
        run: |
          if [ -f flask.pid ]; then
            kill $(cat flask.pid) || true
          fi

    #Part 4:Package the application
      - name: Build Docker image
        run: |
          docker build -t entrytracker:latest .
          
    #Part 5: Run end-to-end (E2E) tests
      - name: Run docker compose
        run: |
          docker compose up --build -d

      - name: Run E2E tests
        run: |
          sleep 20
          curl --fail http://localhost:5000/ || exit 1

      - name: Stop E2E environment
        if: always()
        run: |
          docker compose down
    # Part 6: Push to AWS ECR
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Tag and push Docker image to ECR Public
        run: |
          docker tag entrytracker:latest public.ecr.aws/d2x7s4g6/entrytracker:latest
          docker push public.ecr.aws/d2x7s4g6/entrytracker:latest


      # Deploy to EC2

      - name: Get EC2 public IPs by tag
        id: ec2
        run: |
          IPS=$(aws ec2 describe-instances \
            --region ap-south-1 \
            --filters "Name=tag:App,Values=EntryTracker" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].PublicIpAddress" \
            --output text)

          echo "ips=$IPS" >> $GITHUB_OUTPUT

      - name: Deploy to all EntryTracker EC2 instances
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          for IP in ${{ steps.ec2.outputs.ips }}; do
            echo "Deploying to $IP"

            ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ubuntu@$IP << 'EOF'
              cd ~/entrytracker
              docker compose pull entrytracker
              docker compose up -d --no-deps --force-recreate entrytracker
              docker image prune -f
          EOF
          done  